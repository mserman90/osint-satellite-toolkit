<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Satellite Imagery Toolkit - Autonomous & Geo-Aware</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: white; margin-bottom: 20px; }
        .header { padding: 40px 0; text-align: center; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); border-bottom: 2px solid #0d6efd; }
        #map { height: 350px; width: 100%; border-radius: 8px; border: 1px solid #444; margin-top: 20px; }
        .loading-spinner { display: none; }
        #satellite-display { max-width: 100%; border-radius: 8px; display: none; border: 2px solid #0d6efd; box-shadow: 0 0 15px rgba(13, 110, 253, 0.5); }
        .location-info { font-size: 0.85rem; color: #0dcaf0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Autonomous & Geo-Aware OSINT Toolkit</h1>
        <p class="lead">Nominatim, GIBS & Automatic Geolocation</p>
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>Search Context</h3>
                    <p class="small text-muted">Boş bırakırsanız mevcut konumunuz kullanılır.</p>
                    <div class="mb-3">
                        <label class="form-label">Bölge ve Bağlam</label>
                        <input type="text" id="location-input" class="form-control" placeholder="Örn: Mosul, Iraq">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tarih</label>
                        <input type="date" id="date-input" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Metodoloji (RS4OSINT)</label>
                        <select id="method-select" class="form-select">
                            <option value="VIIRS_SNPP_DayNightBand_ENCC">War at Night (VIIRS Lights)</option>
                            <option value="MODIS_Terra_CorrectedReflectance_TrueColor">True Color (MODIS Optic)</option>
                            <option value="MODIS_Terra_CorrectedReflectance_Bands721">Burn Scar / Oil (MODIS 7-2-1)</option>
                        </select>
                    </div>
                    <button id="analyze-btn" class="btn btn-primary w-100">Analiz Başlat</button>
                    <div class="mt-3 loading-spinner" id="spinner">
                        <div class="spinner-border text-primary" role="status"></div>
                        <span class="ms-2">Uydulara bağlanılıyor...</span>
                    </div>
                </div>
                
                <div id="status-log" class="mt-3 small text-muted"></div>
            </div>

            <div class="col-md-8">
                <div class="card p-3">
                    <div id="map"></div>
                    <div class="mt-3 text-center">
                        <img id="satellite-display" src="" alt="Satellite Image">
                        <div id="image-info" class="mt-2 small text-info"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let marker;

        async function fetchSatelliteImage(lat, lon, date, method) {
            const zoom = 9;
            const x = Math.floor((lon + 180) / 360 * Math.pow(2, zoom));
            const y = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom));
            
            const imageUrl = `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/${method}/default/${date}/GoogleMapsCompatible_Level9/9/${y}/${x}.jpg`;
            
            const satelliteImg = document.getElementById('satellite-display');
            satelliteImg.src = imageUrl;
            satelliteImg.style.display = 'block';
            document.getElementById('image-info').innerText = `Görüntü Kaynağı: NASA GIBS | Konum: ${lat.toFixed(4)}, ${lon.toFixed(4)} | Tarih: ${date}`;
            
            map.setView([lat, lon], 10);
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map);
        }

        document.getElementById('analyze-btn').addEventListener('click', async () => {
            const query = document.getElementById('location-input').value;
            const dateInput = document.getElementById('date-input').value || new Date().toISOString().split('T')[0];
            const method = document.getElementById('method-select').value;
            const spinner = document.getElementById('spinner');
            const log = document.getElementById('status-log');
            
            spinner.style.display = 'block';
            log.innerHTML = "";

            try {
                let lat, lon;

                if (!query) {
                    log.innerHTML = "Girdi yok. Mevcut konumunuz tespit ediliyor...";
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                    });
                    lat = pos.coords.latitude;
                    lon = pos.coords.longitude;
                    log.innerHTML += `<br>Konum tespit edildi: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                } else {
                    log.innerHTML = "Nominatim üzerinden koordinatlar çözümleniyor...";
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                    const geoData = await geoRes.json();
                    if (geoData.length === 0) throw new Error("Bölge bulunamadı.");
                    lat = parseFloat(geoData[0].lat);
                    lon = parseFloat(geoData[0].lon);
                    log.innerHTML += `<br>Bölge çözümlendi.`;
                }

                log.innerHTML += `<br>NASA GIBS verileri çekiliyor...`;
                await fetchSatelliteImage(lat, lon, dateInput, method);
                log.innerHTML += "<br>Başarılı: En güncel görüntü yüklendi.";

            } catch (err) {
                log.innerHTML += `<br>Hata: ${err.message === "User denied Geolocation" ? "Konum izni reddedildi. Lütfen manuel girin." : err.message}`;
            } finally {
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
